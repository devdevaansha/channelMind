{% extends "base.html" %}
{% block title %}Library — atva{% endblock %}
{% block content %}

<div class="page-header">
  <div class="page-header-left">
    <h1 class="page-title">Library</h1>
    <p class="page-subtitle">Browse and filter your transcribed videos</p>
  </div>
</div>

<!-- Filter bar -->
<form class="filter-bar"
  hx-get="{% url 'library:index' %}"
  hx-target="#video-list"
  hx-trigger="change, submit"
  hx-push-url="true">
  <select name="channel" class="form-input w-auto">
    <option value="">All Channels</option>
    {% for ch in channels %}
    <option value="{{ ch.id }}" {% if selected_channel == ch.id|stringformat:'s' %}selected{% endif %}>{{ ch.title }}</option>
    {% endfor %}
  </select>
  <select name="category" class="form-input w-auto">
    <option value="">All Categories</option>
    {% for cat in categories %}
    <option value="{{ cat.id }}" {% if selected_category == cat.id|stringformat:'s' %}selected{% endif %}>{{ cat.name }}</option>
    {% endfor %}
  </select>
  <select name="status" class="form-input w-auto">
    <option value="">All Statuses</option>
    {% for val, label in statuses %}
    <option value="{{ val }}" {% if selected_status == val %}selected{% endif %}>{{ label }}</option>
    {% endfor %}
  </select>
</form>

<!-- Video list -->
<div id="video-list">
  {% include "library/_video_list.html" %}
</div>

{% endblock %}
