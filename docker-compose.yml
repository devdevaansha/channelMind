name: channelmind

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: channelmind
      POSTGRES_USER: channelmind
      POSTGRES_PASSWORD: channelmind
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U channelmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    volumes:
      - data:/data
      - ./secrets:/secrets:ro
    ports:
      - "9000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    volumes:
      - data:/data
      - ./secrets:/secrets:ro
      - torch_venv:/venv_cache
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  beat:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    entrypoint: []
    command:
      - celery
      - -A
      - config.celery
      - beat
      - --loglevel=info
      - --scheduler
      - django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - data:/data
      - ./secrets:/secrets:ro
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  flower:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    entrypoint: []
    command:
      - celery
      - -A
      - config.celery
      - flower
      - --port=5555
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  data:
  torch_venv:
